<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightPath Academy — Student Support</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bp-blue: #1B4FD8;
    --bp-blue-light: #EEF3FF;
    --bp-blue-mid: #C7D6FF;
    --bp-amber: #F59E0B;
    --bp-amber-light: #FFFBEB;
    --bg: #F7F8FC;
    --surface: #FFFFFF;
    --text: #0F1629;
    --text-muted: #6B7280;
    --border: #E5E8F0;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .shell {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bp-blue);
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    width: 260px;
    height: 260px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
    bottom: -80px;
    right: -80px;
  }

  .sidebar::after {
    content: '';
    position: absolute;
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
    top: 60px;
    left: -60px;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--bp-amber);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: #fff;
    line-height: 1.2;
  }

  .logo-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
  }

  .sidebar-section {
    position: relative;
    z-index: 1;
    margin-bottom: 32px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
  }

  .topic-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.85);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.4;
  }

  .topic-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }

  .sidebar-footer {
    margin-top: auto;
    position: relative;
    z-index: 1;
  }

  .api-status {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #34D399;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Main chat area ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
  }

  .topbar-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    border-color: var(--bp-blue);
    color: var(--bp-blue);
    background: var(--bp-blue-light);
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px;
    animation: fadeUp 0.5s ease both;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    background: var(--bp-blue-light);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .empty-icon svg { width: 28px; height: 28px; }

  .empty-state h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 10px;
  }

  .empty-state p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 360px;
  }

  /* ── Message bubbles ── */
  .msg-row {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  .msg-row.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .avatar.bot {
    background: var(--bp-blue);
    color: #fff;
    font-family: 'DM Serif Display', serif;
  }

  .avatar.user-av {
    background: var(--bp-amber);
    color: #fff;
  }

  .bubble {
    max-width: 68%;
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    box-shadow: var(--shadow);
  }

  .bubble.bot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--bp-blue);
    color: #fff;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
  }

  .bubble.error {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: #991B1B;
  }

  .source-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .source-tag {
    font-size: 11px;
    background: var(--bp-blue-light);
    color: var(--bp-blue);
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ── Typing indicator ── */
  .typing-indicator {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .typing-dots {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--bp-blue);
    opacity: 0.3;
    animation: blink 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 20px 32px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 12px 12px 18px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--bp-blue);
    background: #fff;
  }

  #question-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 2px 0;
  }

  #question-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--bp-blue);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #1640B0; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
  }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .messages { padding: 20px; }
    .input-area { padding: 16px 20px 20px; }
    .topbar { padding: 16px 20px; }
    .bubble { max-width: 88%; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo-wrap">
      <div class="logo-mark">B</div>
      <div class="logo-text">
        BrightPath
        <span class="logo-sub">Academy Support</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Suggested topics</div>
      <button class="topic-btn" onclick="askSuggestion(this)">What is the refund policy?</button>
      <button class="topic-btn" onclick="askSuggestion(this)">How do I enrol in a course?</button>
      <button class="topic-btn" onclick="askSuggestion(this)">What payment methods do you accept?</button>
      <button class="topic-btn" onclick="askSuggestion(this)">Can I pause my course?</button>
      <button class="topic-btn" onclick="askSuggestion(this)">How do live sessions work?</button>
      <button class="topic-btn" onclick="askSuggestion(this)">What is the grading scale?</button>
    </div>

    <div class="sidebar-footer">
      <div class="api-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">API connected</span>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <div class="topbar">
      <div>
        <div class="topbar-title">Student Support Chat</div>
        <div class="topbar-sub">Powered by BrightPath knowledge base</div>
      </div>
      <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1B4FD8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2>How can I help you?</h2>
        <p>Ask me anything about BrightPath Academy — courses, enrolment, payments, policies, or getting started.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="question-input"
          rows="1"
          placeholder="Ask a question about BrightPath Academy..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script>
  // ── Config — change this to your Render URL when deployed ──────────────────
  const API_URL = 'http://localhost:8000/api/chat';

  let isLoading = false;

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Keyboard handling ─────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Suggested topic clicked ───────────────────────────────────────────────
  function askSuggestion(btn) {
    const input = document.getElementById('question-input');
    input.value = btn.textContent.trim();
    autoResize(input);
    sendMessage();
  }

  // ── Add a message bubble ──────────────────────────────────────────────────
  function addMessage(role, text, sources) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatarHTML = role === 'bot'
      ? `<div class="avatar bot">B</div>`
      : `<div class="avatar user-av">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
             <circle cx="12" cy="7" r="4"/>
           </svg>
         </div>`;

    let sourcesHTML = '';
    if (sources && sources.length > 0) {
      const tags = sources.map(s => {
        const short = s.replace(/^\d+_BrightPath_/, '').replace('.docx', '').replace(/_/g, ' ');
        return `<span class="source-tag">${short}</span>`;
      }).join('');
      sourcesHTML = `<div class="source-tags">${tags}</div>`;
    }

    const bubbleClass = role === 'bot' ? 'bot' : 'user';
    row.innerHTML = `
      ${avatarHTML}
      <div class="bubble ${bubbleClass}">
        ${escapeHTML(text)}
        ${sourcesHTML}
      </div>
    `;

    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function addErrorMessage(text) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `
      <div class="avatar bot">B</div>
      <div class="bubble bot error">${escapeHTML(text)}</div>
    `;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  function showTyping() {
    const container = document.getElementById('messages');
    const el = document.createElement('div');
    el.id = 'typing';
    el.className = 'typing-indicator';
    el.innerHTML = `
      <div class="avatar bot">B</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    `;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();

    if (!question || isLoading) return;

    isLoading = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    addMessage('user', question);
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          session_id: getSessionId()
        })
      });

      hideTyping();

      if (!res.ok) {
        throw new Error(`Server error: ${res.status}`);
      }

      const data = await res.json();

      if (data.success) {
        addMessage('bot', data.answer, data.sources);
      } else {
        addErrorMessage(data.answer);
      }

    } catch (err) {
      hideTyping();
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        addErrorMessage('Cannot reach the API. Make sure your FastAPI server is running at ' + API_URL);
        setStatus(false);
      } else {
        addErrorMessage('Something went wrong. Please try again.');
      }
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  // ── Clear chat ────────────────────────────────────────────────────────────
  function clearChat() {
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1B4FD8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2>How can I help you?</h2>
        <p>Ask me anything about BrightPath Academy — courses, enrolment, payments, policies, or getting started.</p>
      </div>
    `;
  }

  // ── Session ID ────────────────────────────────────────────────────────────
  function getSessionId() {
    if (!sessionStorage.getItem('bp_session')) {
      sessionStorage.setItem('bp_session', 'sess_' + Math.random().toString(36).slice(2, 10));
    }
    return sessionStorage.getItem('bp_session');
  }

  // ── API status indicator ──────────────────────────────────────────────────
  function setStatus(online) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (online) {
      dot.style.background = '#34D399';
      text.textContent = 'API connected';
    } else {
      dot.style.background = '#F87171';
      text.textContent = 'API offline';
    }
  }

  async function checkHealth() {
    try {
      const res = await fetch(API_URL.replace('/api/chat', '/health'));
      setStatus(res.ok);
    } catch {
      setStatus(false);
    }
  }

  // ── Escape HTML ───────────────────────────────────────────────────────────
  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  checkHealth();
  setInterval(checkHealth, 30000);
  document.getElementById('question-input').focus();
</script>

</body>
</html>
