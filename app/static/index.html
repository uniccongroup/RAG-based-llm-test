<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academy X – AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #6c63ff;
      --brand-dark:  #4b44cc;
      --brand-light: #ede9ff;
      --user-bg:     #6c63ff;
      --user-text:   #ffffff;
      --bot-bg:      #f0f2f5;
      --bot-text:    #1a1a2e;
      --surface:     #ffffff;
      --bg:          #f7f8fc;
      --border:      #e2e5ec;
      --muted:       #8a8fa8;
      --danger:      #ff4d6d;
      --radius:      14px;
      --shadow:      0 4px 24px rgba(108,99,255,.12);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--brand);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      flex-shrink: 0;
    }
    .avatar {
      width: 42px; height: 42px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-text h1 { font-size: 1rem; font-weight: 700; }
    .header-text p  { font-size: .75rem; opacity: .8; }
    .status-dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 0 3px rgba(74,222,128,.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(74,222,128,.3); }
      50%      { box-shadow: 0 0 0 6px rgba(74,222,128,.1); }
    }

    /* ── CHAT WINDOW ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* ── MESSAGE ROWS ── */
    .row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 780px;
      width: 100%;
    }
    .row.user  { margin-left: auto; flex-direction: row-reverse; }
    .row.bot   { margin-right: auto; }

    .icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .row.bot  .icon { background: var(--brand-light); color: var(--brand); }
    .row.user .icon { background: var(--brand-dark);  color: #fff; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: .9rem;
      max-width: calc(100% - 44px);
      word-break: break-word;
    }
    .row.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .row.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
    }
    .bubble.error { background: #fff0f3; color: var(--danger); border: 1px solid #ffc2ce; }



    /* ── TYPING INDICATOR ── */
    .typing { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
    .typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--brand); opacity: .4;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity:.4; }
      40%          { transform: translateY(-6px); opacity:1; }
    }

    /* ── WELCOME ── */
    #welcome {
      margin: auto;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    #welcome .emoji { font-size: 3rem; margin-bottom: 12px; }
    #welcome h2 { font-size: 1.2rem; color: var(--bot-text); margin-bottom: 8px; }
    #welcome p  { font-size: .88rem; max-width: 360px; margin: 0 auto 20px; }
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; max-width: 480px; margin: 0 auto;
    }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 7px 14px; font-size: .8rem;
      cursor: pointer; color: var(--brand); font-weight: 500;
      transition: background .15s, border-color .15s;
    }
    .chip:hover { background: var(--brand-light); border-color: var(--brand); }

    /* ── INPUT BAR ── */
    #input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      resize: none; overflow: hidden;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: .9rem;
      font-family: inherit;
      line-height: 1.45;
      outline: none;
      transition: border-color .2s;
      min-height: 44px; max-height: 140px;
    }
    #input:focus { border-color: var(--brand); }

    #send {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 50%; border: none;
      background: var(--brand); color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    #send:hover:not(:disabled) { background: var(--brand-dark); }
    #send:active:not(:disabled) { transform: scale(.93); }
    #send:disabled { background: var(--border); cursor: not-allowed; }
    #send svg { width: 18px; height: 18px; fill: currentColor; }

    /* scrollbar */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="avatar">🤖</div>
  <div class="header-text">
    <h1>Academy X AI Assistant</h1>
    <p>Powered by RAG · Ask me anything about our programs</p>
  </div>
  <div class="status-dot" title="Online"></div>
</header>

<!-- CHAT WINDOW -->
<div id="chat">
  <div id="welcome">
    <div class="emoji">👋</div>
    <h2>Hi there! How can I help you today?</h2>
    <p>I can answer questions about our courses, enrollment, fees, policies, and support.</p>
    <div class="suggestions">
      <button class="chip" onclick="sendChip(this)">What courses do you offer?</button>
      <button class="chip" onclick="sendChip(this)">How do I enroll?</button>
      <button class="chip" onclick="sendChip(this)">How much does it cost?</button>
      <button class="chip" onclick="sendChip(this)">Can I learn on my phone?</button>
      <button class="chip" onclick="sendChip(this)">What is the refund policy?</button>
      <button class="chip" onclick="sendChip(this)">What support is available?</button>
    </div>
  </div>
</div>

<!-- INPUT BAR -->
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Ask a question…" maxlength="500"></textarea>
  <button id="send" onclick="sendMessage()" title="Send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const welcome = document.getElementById('welcome');
  let   busy    = false;

  /* ── auto-grow textarea ── */
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendChip(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  function sendMessage() {
    const text = input.value.trim();
    if (!text || busy) return;

    /* hide welcome screen on first message */
    if (welcome) { welcome.remove(); }

    appendUser(text);
    input.value = '';
    input.style.height = 'auto';

    const typingRow = appendTyping();
    setBusy(true);

    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text })
    })
    .then(r => {
      if (!r.ok) throw new Error(`Server error ${r.status}`);
      return r.json();
    })
    .then(data => {
      typingRow.remove();
      appendBot(data.answer, data.sources || []);
    })
    .catch(err => {
      typingRow.remove();
      appendError('Sorry, something went wrong. Please try again.');
      console.error(err);
    })
    .finally(() => setBusy(false));
  }

  function setBusy(state) {
    busy = state;
    sendBtn.disabled = state;
    input.disabled   = state;
  }

  function appendUser(text) {
    const row = document.createElement('div');
    row.className = 'row user';
    row.innerHTML = `
      <div class="icon">🧑</div>
      <div class="bubble">${escHtml(text)}</div>`;
    chat.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'row bot';
    row.innerHTML = `
      <div class="icon">🤖</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    chat.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendBot(answer, sources) {
    const row = document.createElement('div');
    row.className = 'row bot';
    row.innerHTML = `
      <div class="icon">🤖</div>
      <div class="bubble">
        <div>${formatAnswer(answer)}</div>
      </div>`;
    chat.appendChild(row);
    scrollBottom();
  }

  function appendError(msg) {
    const row = document.createElement('div');
    row.className = 'row bot';
    row.innerHTML = `
      <div class="icon">🤖</div>
      <div class="bubble error">⚠️ ${escHtml(msg)}</div>`;
    chat.appendChild(row);
    scrollBottom();
  }

function formatAnswer(text) {
    /* convert **bold**, bullet lines, and newlines to HTML */
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^[-•]\s+/gm, '• ')
      .replace(/\n/g, '<br>');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scrollBottom() {
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
  }
</script>

</body>
</html>
